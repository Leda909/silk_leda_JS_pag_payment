services:

  webserver:
    image: adele-web-server-image
    build:
      dockerfile: Dockerfile
      context: .
    ports:
      - "9090:80"
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: password
    ports:
      - "9091:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      #- ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      #- ./db/my.cnf:/etc/mysql/my.cnf

volumes:
  mysql_data:
